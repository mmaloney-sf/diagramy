<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diagramy Web</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="left-panel">
            <div id="editor"></div>
            <div class="controls">
                <label for="keybinding-select">Key Bindings:</label>
                <select id="keybinding-select">
                    <option value="default">Default</option>
                    <option value="vim">Vim</option>
                </select>

                <label for="example-select">Examples:</label>
                <select id="example-select">
                    <option value="">-- Select Example --</option>
                </select>
            </div>
        </div>
        <div class="right-panel">
            <div id="svg-container"></div>
        </div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.2/ace.js" type="text/javascript" charset="utf-8"></script>
    <script src="mode-diagramy.js" type="text/javascript" charset="utf-8"></script>
    <script type="module" src="script.js"></script>
</body>
</html>
